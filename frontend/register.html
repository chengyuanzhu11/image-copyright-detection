<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 图像版权检测系统</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        .register-container {
            max-width: 100%;
            margin: 0 auto;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
        }
        .card-header {
            background: linear-gradient(90deg, #3a7bd5, #00d2ff);
            color: white;
            font-weight: bold;
            border-radius: 10px 10px 0 0 !important;
            padding: 20px;
            text-align: center;
        }
        .form-control {
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #ced4da;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            border-color: #3a7bd5;
            box-shadow: 0 0 0 0.25rem rgba(58, 123, 213, 0.25);
        }
        .form-label {
            font-weight: bold;
            color: #495057;
        }
        .btn-primary {
            background: linear-gradient(90deg, #3a7bd5, #00d2ff);
            border: none;
            border-radius: 20px;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
        .register-icon {
            font-size: 5rem;
            color: #3a7bd5;
            margin-bottom: 20px;
        }
        .alert {
            border-radius: 10px;
            padding: 15px;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        .login-link a {
            color: #3a7bd5;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        .login-link a:hover {
            color: #00d2ff;
        }
        .input-group-text {
            background: transparent;
            border-left: none;
            cursor: pointer;
        }
        .password-strength {
            height: 5px;
            margin-top: 5px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .password-strength-text {
            font-size: 0.8rem;
            margin-left: 5px;
        }
        .password-weak {
            background-color: #dc3545;
            width: 30%;
        }
        .password-medium {
            background-color: #ffc107;
            width: 60%;
        }
        .password-strong {
            background-color: #28a745;
            width: 100%;
        }
        /* 抖动动画效果 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="text-center">
                    <i class="fas fa-user-plus register-icon"></i>
                    <h2 class="mb-4">用户注册</h2>
                </div>
                
                <div id="alertMessage" class="alert alert-danger" style="display: none;" role="alert"></div>
                
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-user-edit"></i> 创建新账号
                    </div>
                    <div class="card-body p-4">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">
                                    <i class="fas fa-user"></i> 用户名
                                </label>
                                <input type="text" class="form-control" id="username" placeholder="请输入用户名（至少4个字符）" required minlength="4">
                                <div class="form-text text-muted">用户名将用于登录系统</div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    <i class="fas fa-lock"></i> 密码
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="password" placeholder="请输入密码（至少6个字符）" required minlength="6">
                                    <span class="input-group-text" id="togglePassword">
                                        <i class="fas fa-eye-slash"></i>
                                    </span>
                                </div>
                                <div class="password-strength" id="passwordStrength"></div>
                                <small class="password-strength-text" id="passwordStrengthText"></small>
                            </div>
                            
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">
                                    <i class="fas fa-check-circle"></i> 确认密码
                                </label>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="请再次输入密码" required>
                                <div id="passwordMatch" class="form-text"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">
                                    <i class="fas fa-envelope"></i> 电子邮箱（可选）
                                </label>
                                <input type="email" class="form-control" id="email" placeholder="请输入您的电子邮箱">
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="agreeTerms" required>
                                <label class="form-check-label" for="agreeTerms">我同意 <a href="#" id="showTerms">服务条款和隐私政策</a></label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-user-plus"></i> 注册
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="login-link">
                    已有账号？<a href="#" id="showLogin">立即登录</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            const alertMessage = document.getElementById('alertMessage');
            const showLogin = document.getElementById('showLogin');
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const passwordStrength = document.getElementById('passwordStrength');
            const passwordStrengthText = document.getElementById('passwordStrengthText');
            const passwordMatch = document.getElementById('passwordMatch');
            const usernameInput = document.getElementById('username');
            
            // 切换密码可见性
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
            
            // 密码强度检查
            passwordInput.addEventListener('input', function() {
                const value = this.value;
                let strength = 0;
                
                if (value.length >= 6) strength += 1;
                if (value.length >= 10) strength += 1;
                if (/[A-Z]/.test(value)) strength += 1;
                if (/[0-9]/.test(value)) strength += 1;
                if (/[^A-Za-z0-9]/.test(value)) strength += 1;
                
                // 更新密码强度显示
                passwordStrength.className = 'password-strength';
                passwordStrengthText.textContent = '';
                
                if (value.length === 0) {
                    passwordStrength.style.width = '0%';
                } else if (strength <= 2) {
                    passwordStrength.classList.add('password-weak');
                    passwordStrengthText.textContent = '弱';
                    passwordStrengthText.style.color = '#dc3545';
                } else if (strength <= 4) {
                    passwordStrength.classList.add('password-medium');
                    passwordStrengthText.textContent = '中';
                    passwordStrengthText.style.color = '#ffc107';
                } else {
                    passwordStrength.classList.add('password-strong');
                    passwordStrengthText.textContent = '强';
                    passwordStrengthText.style.color = '#28a745';
                }
                
                // 检查密码匹配
                checkPasswordMatch();
            });
            
            // 确认密码匹配检查
            confirmPasswordInput.addEventListener('input', checkPasswordMatch);
            
            function checkPasswordMatch() {
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
                if (confirmPassword.length === 0) {
                    passwordMatch.textContent = '';
                    passwordMatch.className = 'form-text';
                } else if (password === confirmPassword) {
                    passwordMatch.textContent = '密码匹配';
                    passwordMatch.className = 'form-text text-success';
                } else {
                    passwordMatch.textContent = '密码不匹配';
                    passwordMatch.className = 'form-text text-danger';
                }
            }
            
            // 显示登录页面
            showLogin.addEventListener('click', function(e) {
                e.preventDefault();
                // 通知父窗口显示登录页面
                window.parent.postMessage({ type: 'show-login' }, '*');
            });
            
            // 处理注册表单提交
            registerForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                const email = document.getElementById('email').value.trim();
                const agreeTerms = document.getElementById('agreeTerms').checked;
                
                // 客户端验证
                if (username.length < 4) {
                    showAlert('用户名至少需要4个字符');
                    usernameInput.focus();
                    return;
                }
                
                if (password.length < 6) {
                    showAlert('密码至少需要6个字符');
                    passwordInput.focus();
                    return;
                }
                
                if (password !== confirmPassword) {
                    showAlert('两次输入的密码不匹配');
                    confirmPasswordInput.focus();
                    return;
                }
                
                if (!agreeTerms) {
                    showAlert('请同意服务条款和隐私政策');
                    return;
                }
                
                // 显示加载状态
                const submitBtn = registerForm.querySelector('button[type="submit"]');
                const originalBtnText = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 注册中...';
                
                // 注册处理逻辑
                setTimeout(function() {
                    try {
                        console.log('开始注册处理');
                        
                        // 获取现有用户数据
                        let users = [];
                        try {
                            const usersData = localStorage.getItem('users');
                            users = usersData ? JSON.parse(usersData) : [];
                            console.log('已获取用户数据:', users);
                        } catch (error) {
                            console.error('解析用户数据出错:', error);
                            users = [];
                        }
                        
                        // 检查用户名是否已存在
                        const existingUser = users.find(u => u.username === username);
                        if (existingUser) {
                            showAlert('用户名已存在，请选择另一个用户名');
                            usernameInput.focus();
                            // 添加抖动效果
                            usernameInput.classList.add('shake');
                            setTimeout(() => {
                                usernameInput.classList.remove('shake');
                            }, 500);
                            
                            submitBtn.disabled = false;
                            submitBtn.innerHTML = originalBtnText;
                            return;
                        }
                        
                        // 添加新用户
                        const currentDate = new Date().toLocaleDateString('zh-CN', {
                            year: 'numeric', 
                            month: 'long', 
                            day: 'numeric'
                        });
                        
                        const newUser = {
                            username: username,
                            password: password,
                            email: email,
                            registerDate: currentDate,
                            location: '',
                            bio: ''
                        };
                        
                        console.log('准备添加新用户:', newUser);
                        users.push(newUser);
                        
                        // 保存用户数据
                        localStorage.setItem('users', JSON.stringify(users));
                        console.log('用户数据已保存');
                        
                        // 显示成功消息
                        showAlert('注册成功！您现在可以登录了', 'success');
                        
                        // 通知父窗口注册成功
                        window.parent.postMessage({ 
                            type: 'register-success'
                        }, '*');
                        console.log('已发送注册成功消息');
                        
                        // 重置表单
                        registerForm.reset();
                        
                        // 延迟后切换到登录页面
                        setTimeout(function() {
                            console.log('准备切换到登录页面...');
                            // 在登录页面预填充用户名
                            localStorage.setItem('registerUsername', username);
                            
                            // 通知父窗口切换到登录页面
                            window.parent.postMessage({ 
                                type: 'show-login'
                            }, '*');
                            console.log('已发送切换到登录页面消息');
                        }, 2000);
                    } catch (error) {
                        console.error('注册过程发生错误:', error);
                        showAlert('注册失败: ' + error.message, 'danger');
                        
                        // 恢复按钮状态
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalBtnText;
                    }
                }, 1000);
            });
            
            // 显示提示消息
            function showAlert(message, type = 'danger') {
                alertMessage.textContent = message;
                alertMessage.className = `alert alert-${type}`;
                alertMessage.style.display = 'block';
                
                // 确保错误消息可见
                alertMessage.scrollIntoView({ behavior: 'smooth', block: 'start' });
                
                // 如果是成功消息，5秒后自动隐藏
                if (type === 'success') {
                    setTimeout(function() {
                        alertMessage.style.display = 'none';
                    }, 5000);
                } else {
                    // 为错误消息添加抖动效果
                    alertMessage.classList.add('shake');
                    setTimeout(() => {
                        alertMessage.classList.remove('shake');
                    }, 500);
                }
            }
        });
    </script>
</body>
</html>
