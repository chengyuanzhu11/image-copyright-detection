<head>

    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        .profile-container {
            max-width: 100%;
            margin: 0 auto;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(90deg, #3a7bd5, #00d2ff);
            color: white;
            font-weight: bold;
            border-radius: 10px 10px 0 0 !important;
            padding: 20px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0.25rem 0.5rem rgba(0, 0, 0, 0.05);
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #3a7bd5;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            margin-right: 20px;
        }
        .profile-info h2 {
            margin: 0;
            color: #343a40;
        }
        .profile-info p {
            color: #6c757d;
            margin: 5px 0 0 0;
        }
        .btn-edit {
            background: linear-gradient(90deg, #3a7bd5, #00d2ff);
            border: none;
            border-radius: 20px;
            padding: 8px 15px;
            font-weight: bold;
            color: white;
            transition: all 0.3s;
            margin-left: auto;
        }
        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            color: white;
        }
        .form-control {
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #ced4da;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            border-color: #3a7bd5;
            box-shadow: 0 0 0 0.25rem rgba(58, 123, 213, 0.25);
        }
        .form-label {
            font-weight: bold;
            color: #495057;
        }
        .btn-save {
            background: linear-gradient(90deg, #3a7bd5, #00d2ff);
            border: none;
            border-radius: 20px;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
            color: white;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            color: white;
        }
        .alert {
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background-color: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 0.25rem 0.5rem rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #3a7bd5;
        }
        .stat-label {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .upload-history-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f1f1f1;
        }
        .upload-history-item:last-child {
            border-bottom: none;
        }
        .history-thumbnail {
            width: 50px;
            height: 50px;
            background-color: #e9ecef;
            border-radius: 5px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .history-info {
            flex-grow: 1;
        }
        .history-date {
            font-size: 0.8rem;
            color: #6c757d;
        }
        .history-status {
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 10px;
            background-color: #e9ecef;
            margin-left: 10px;
        }
        .status-safe {
            background-color: #d4edda;
            color: #155724;
        }
        .status-risk {
            background-color: #f8d7da;
            color: #721c24;
        }
        /* 编辑模式的样式 */
        .edit-mode {
            display: none;
        }
        /* 抖动动画效果 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        
        /* 导航栏样式 */
        .navbar {
            background: linear-gradient(90deg, #3a7bd5, #00d2ff);
            border-radius: 10px;
            padding: 12px 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .navbar-brand {
            color: white !important;
            font-weight: bold;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
        }
        
        .nav-link {
            color: white !important;
            font-weight: 600;
            margin: 0 10px;
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        
        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .logo-icon {
            font-size: 1.5rem;

        /* 强制导航栏显示的样式 */
        #navbarNav {
            display: flex !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        @media (max-width: 991.98px) {
            #navbarNav {
                flex-direction: column;
            }
            
            .nav-link[href="ai_detection.html"] {
                margin-top: 10px !important;
                margin-bottom: 10px !important;
            }
        }
    </style>
</head>

    <script>
        // 页面加载完成后执行
        window.addEventListener('load', function() {
            // 检查URL参数是否要强制登录
            const urlParams = new URLSearchParams(window.location.search);
            const forceLogin = urlParams.get('forceLogin');
            
            if (forceLogin === '1') {
                // 强制登录
                console.log('强制登录');
                const user = localStorage.getItem('currentUser');
                if (user) {
                    console.log('从localStorage检测到用户:', user);
                    // 清除URL参数
                    window.history.replaceState({}, document.title, 'profile.html');
                }
            }
            
            // 强制显示导航栏菜单
            const navCollapse = document.getElementById('navbarNav');
            if (navCollapse) {
                // 始终添加show类确保导航栏展开
                navCollapse.classList.add('show');
                
                // 对于大屏幕，不需要折叠按钮
                if (window.innerWidth >= 992) {
                    document.querySelector('.navbar-toggler').style.display = 'none';
                }
            }
            
            // 确保AI检测链接高亮可见
            const aiDetectionLink = document.querySelector('a.nav-link[href="ai_detection.html"]');
            if (aiDetectionLink) {
                aiDetectionLink.style.setProperty('background-color', 'rgba(255, 255, 255, 0.2)', 'important');
                aiDetectionLink.style.setProperty('color', '#ffff00', 'important');
                aiDetectionLink.style.setProperty('font-weight', 'bold', 'important');
                aiDetectionLink.style.setProperty('text-shadow', '0 0 5px rgba(0,0,0,0.5)', 'important');
                aiDetectionLink.style.setProperty('display', 'inline-block', 'important');
            }
            
            // 检查用户会话是否过期
            checkSessionTimeout();
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // DOM元素
            const alertMessage = document.getElementById('alertMessage');
            const editProfileBtn = document.getElementById('editProfileBtn');
            const viewMode = document.getElementById('viewMode');
            const editMode = document.getElementById('editMode');
            const profileForm = document.getElementById('profileForm');
            const cancelEditBtn = document.getElementById('cancelEditBtn');
            const changePasswordBtn = document.getElementById('changePasswordBtn');
            const passwordForm = document.getElementById('passwordForm');
            const cancelPasswordBtn = document.getElementById('cancelPasswordBtn');
            const changePasswordForm = document.getElementById('changePasswordForm');
            const uploadHistory = document.getElementById('uploadHistory');
            const noHistoryMessage = document.getElementById('noHistoryMessage');
            
            // 显示模式的元素
            const displayUsername = document.getElementById('displayUsername');
            const displayEmail = document.getElementById('displayEmail');
            const memberSince = document.getElementById('memberSince');
            const viewUsername = document.getElementById('viewUsername');
            const viewEmail = document.getElementById('viewEmail');
            const viewLocation = document.getElementById('viewLocation');
            const viewBio = document.getElementById('viewBio');
            
            // 导航栏元素
            const navUsername = document.getElementById('navUsername');
            const navLogoutBtn = document.getElementById('navLogoutBtn');
            
            // 编辑模式的元素
            const editUsername = document.getElementById('editUsername');
            const editEmail = document.getElementById('editEmail');
            const editLocation = document.getElementById('editLocation');
            const editBio = document.getElementById('editBio');
            
            // 从localStorage获取当前用户
            let currentUser = null;
            const loggedInUser = localStorage.getItem('currentUser');
            
            if (loggedInUser) {
                try {
                    // 尝试解析为JSON对象
                    currentUser = JSON.parse(loggedInUser);
                    loadUserProfile(currentUser);
                    updateUserStats(currentUser);
                } catch (e) {
                    console.error('解析用户数据时出错', e);
                    
                    // 如果不是JSON格式，将其视为用户名字符串，创建一个简单的用户对象
                    currentUser = {
                        username: loggedInUser,
                        email: '',
                        location: '',
                        bio: '',
                        registerDate: new Date().toLocaleDateString('zh-CN', {year: 'numeric', month: 'long', day: 'numeric'}),
                        uploadHistory: []
                    };
                    loadUserProfile(currentUser);
                    updateUserStats(currentUser);
                }
            } else {
                // 没有登录的用户，应该重定向到登录页面
                showAlert('请先登录后再访问个人简介', 'danger');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
            
            // 加载用户资料
            function loadUserProfile(user) {
                if (!user) return;
                
                // 更新显示模式的信息
                displayUsername.textContent = user.username || '未设置';
                displayEmail.textContent = user.email || '未设置邮箱';
                viewUsername.textContent = user.username || '未设置';
                viewEmail.textContent = user.email || '未设置邮箱';
                viewLocation.textContent = user.location || '未设置';
                viewBio.textContent = user.bio || '未设置';
                
                // 更新编辑模式的表单
                editUsername.value = user.username || '';
                editEmail.value = user.email || '';
                editLocation.value = user.location || '';
                editBio.value = user.bio || '';
                
                // 更新注册时间
                memberSince.textContent = '注册时间：' + (user.registerDate || '未知');
                
                // 加载上传历史
                loadUploadHistory(user);
            }
            
            // 加载上传历史
            function loadUploadHistory(user) {
                if (!user || !user.uploadHistory || user.uploadHistory.length === 0) {
                    uploadHistory.innerHTML = '';
                    noHistoryMessage.style.display = 'block';
                    return;
                }
                
                noHistoryMessage.style.display = 'none';
                uploadHistory.innerHTML = '';
                
                // 只显示最近的5条记录
                const historyToShow = user.uploadHistory.slice(0, 5);
                
                historyToShow.forEach(item => {
                    const historyItem = document.createElement('div');
                    historyItem.className = 'upload-history-item';
                    
                    historyItem.innerHTML = `
                        <div class="history-thumbnail">
                            <i class="fas fa-image"></i>
                        </div>
                        <div class="history-info">
                            <div>${item.filename}</div>
                            <div class="history-date">${item.date}</div>
                        </div>
                        <span class="history-status ${item.status === 'safe' ? 'status-safe' : 'status-risk'}">
                            ${item.status === 'safe' ? '安全' : '风险'}
                        </span>
                    `;
                    
                    uploadHistory.appendChild(historyItem);
                });
            }
            
            // 编辑个人资料按钮
            editProfileBtn.addEventListener('click', function() {
                viewMode.style.display = 'none';
                editMode.style.display = 'block';
            });
            
            // 取消编辑按钮
            cancelEditBtn.addEventListener('click', function() {
                viewMode.style.display = 'block';
                editMode.style.display = 'none';
                
                // 重置表单内容为当前值
                if (currentUser) {
                    editEmail.value = currentUser.email || '';
                    editLocation.value = currentUser.location || '';
                    editBio.value = currentUser.bio || '';
                }
            });
            
            // 提交个人资料表单
            profileForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                if (!currentUser) {
                    showAlert('请先登录后再更新个人资料', 'danger');
                    return;
                }
                
                // 更新用户信息
                currentUser.email = editEmail.value.trim();
                currentUser.location = editLocation.value.trim();
                currentUser.bio = editBio.value.trim();
                
                // 保存到localStorage
                updateUser(currentUser);
                
                // 更新显示模式的信息
                displayEmail.textContent = currentUser.email || '未设置邮箱';
                viewEmail.textContent = currentUser.email || '未设置邮箱';
                viewLocation.textContent = currentUser.location || '未设置';
                viewBio.textContent = currentUser.bio || '未设置';
                
                // 切换回显示模式
                viewMode.style.display = 'block';
                editMode.style.display = 'none';
                
                showAlert('个人资料已成功更新', 'success');
            });
            
            // 修改密码按钮
            changePasswordBtn.addEventListener('click', function() {
                passwordForm.style.display = passwordForm.style.display === 'none' ? 'block' : 'none';
            });
            
            // 取消修改密码
            cancelPasswordBtn.addEventListener('click', function() {
                passwordForm.style.display = 'none';
                changePasswordForm.reset();
            });
            
            // 提交修改密码表单
            changePasswordForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                if (!currentUser) {
                    showAlert('请先登录后再修改密码', 'danger');
                    return;
                }
                
                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmNewPassword = document.getElementById('confirmNewPassword').value;
                
                console.log('当前密码:', currentPassword);
                console.log('储存的密码:', currentUser.password);
                
                // 处理没有密码字段的情况
                if (!currentUser.password) {
                    // 如果用户数据是非JSON格式创建的，可能没有password字段
                    // 或者是通过index.html页面登录，只存储了用户名
                    
                    // 创建一个临时密码
                    currentUser.password = currentPassword;
                    updateUser(currentUser);
                    
                    // 检查新密码是否匹配
                    if (newPassword !== confirmNewPassword) {
                        showAlert('两次输入的新密码不匹配', 'danger');
                        return;
                    }
                    
                    // 更新密码
                    currentUser.password = newPassword;
                    updateUser(currentUser);
                    
                    // 重置表单并隐藏
                    changePasswordForm.reset();
                    passwordForm.style.display = 'none';
                    
                    showAlert('密码已成功设置', 'success');
                    return;
                }
                
                // 检查当前密码是否正确
                if (currentPassword !== currentUser.password) {
                    showAlert('当前密码不正确', 'danger');
                    return;
                }
                
                // 检查新密码是否匹配
                if (newPassword !== confirmNewPassword) {
                    showAlert('两次输入的新密码不匹配', 'danger');
                    return;
                }
                
                // 更新密码
                currentUser.password = newPassword;
                
                // 更新用户数据
                updateUser(currentUser);
                
                // 重置表单并隐藏
                changePasswordForm.reset();
                passwordForm.style.display = 'none';
                
                showAlert('密码已成功更新', 'success');
            });
            
            // 更新用户信息
            function updateUser(user) {
                // 保存到localStorage中的当前用户
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                // 更新用户数组中的用户
                let users = JSON.parse(localStorage.getItem('users') || '[]');
                const index = users.findIndex(u => u.username === user.username);
                
                if (index !== -1) {
                    users[index] = {
                        ...users[index],
                        email: user.email,
                        password: user.password,
                        location: user.location,
                        bio: user.bio
                    };
                    localStorage.setItem('users', JSON.stringify(users));
                }
            }
            
            // 显示提示消息
            function showAlert(message, type = 'success') {
                alertMessage.textContent = message;
                alertMessage.className = `alert alert-${type}`;
                alertMessage.style.display = 'block';
                
                alertMessage.scrollIntoView({ behavior: 'smooth', block: 'start' });
                
                if (type === 'danger') {
                    alertMessage.classList.add('shake');
                    setTimeout(() => {
                        alertMessage.classList.remove('shake');
                    }, 500);
                }
                
                // 5秒后自动隐藏
                setTimeout(function() {
                    alertMessage.style.display = 'none';
                }, 5000);
            }
            
            // 模拟数据（实际情况下应从后端获取）
            if (!currentUser && loggedInUser === null) {
                currentUser = {
                    username: '测试用户',
                    email: 'test@example.com',
                    location: '北京',
                    bio: '这是一个测试用户的个人简介，用于展示页面效果。',
                    registerDate: '2023年1月1日',
                    uploadHistory: [
                        { filename: '示例图片1.jpg', date: '2023-01-01 10:30:15', status: 'safe' },
                        { filename: '示例图片2.jpg', date: '2023-01-02 15:45:30', status: 'risk' }
                    ]
                };
                loadUserProfile(currentUser);
                updateUserStats(currentUser);
            }
            
            // 处理导航栏的用户名显示
            if (currentUser) {
                // 从currentUser对象中提取用户名
                let displayName = typeof currentUser === 'string' ? 
                    currentUser : (currentUser.username || '个人中心');
                
                // 设置导航栏显示
                if (navUsername) {
                    navUsername.textContent = displayName;
                }
            }
            
            // 处理退出登录按钮
            navLogoutBtn.addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.removeItem('currentUser');
                localStorage.removeItem('userToken');
                localStorage.removeItem('lastActivity');
                
                window.location.href = 'index.html';
            });
            
            // 检查用户会话是否过期
            function checkSessionTimeout() {
                const lastActivity = localStorage.getItem('lastActivity');
                if (lastActivity) {
                    const currentTime = new Date().getTime();
                    const inactiveTime = currentTime - parseInt(lastActivity);
                    
                    // 如果超过2小时无活动，则自动登出（7200000毫秒 = 2小时）
                    if (inactiveTime > 7200000) {
                        localStorage.removeItem('currentUser');
                        localStorage.removeItem('userToken');
                        localStorage.removeItem('lastActivity');
                        
                        // 显示超时提示
                        alert('您的会话已超时，请重新登录');
                        
                        // 重定向到首页
                        window.location.href = 'index.html';
                    } else {
                        // 更新最后活动时间
                        localStorage.setItem('lastActivity', currentTime);
                    }
                }
            }
            
            // 检查导航栏链接是否正确显示
            const navLinks = document.querySelectorAll('.nav-link');
            console.log('导航栏链接数量:', navLinks.length);
            navLinks.forEach((link, index) => {
                console.log(`链接 ${index + 1}:`, link.textContent.trim(), `- 可见性:`, link.offsetParent !== null);
            });

            // 更新用户统计数据
            function updateUserStats(user) {
                if (!user || !user.uploadHistory) {
                    return;
                }
                
                const totalUploadsElement = document.getElementById('totalUploads');
                const riskImagesElement = document.getElementById('riskImages');
                const safeImagesElement = document.getElementById('safeImages');
                
                const totalUploads = user.uploadHistory.length;
                let riskImages = 0;
                let safeImages = 0;
                
                // 计算风险和安全图片数量
                user.uploadHistory.forEach(item => {
                    if (item.status === 'risk') {
                        riskImages++;
                    } else if (item.status === 'safe') {
                        safeImages++;
                    }
                });
                
                // 更新显示
                if (totalUploadsElement) totalUploadsElement.textContent = totalUploads;
                if (riskImagesElement) riskImagesElement.textContent = riskImages;
                if (safeImagesElement) safeImagesElement.textContent = safeImages;
            }
        });
    </script>
</body>
